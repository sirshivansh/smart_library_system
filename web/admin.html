<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Haven — Admin Dashboard</title>
  <meta name="description" content="Admin dashboard for Book Haven Smart Library System" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <div class="brand-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;color:white;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <div>
        <div class="brand-name">Book Haven</div>
        <div class="brand-sub">Admin Dashboard</div>
      </div>
    </a>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-overview" onclick="switchTab('overview')">📊 Overview</button>
      <button class="nav-tab" id="tab-books" onclick="switchTab('books')">📚 Books</button>
      <button class="nav-tab" id="tab-members" onclick="switchTab('members')">👥 Members</button>
      <button class="nav-tab" id="tab-transactions" onclick="switchTab('transactions')">📝 Transactions</button>
    </div>
    <div class="nav-user">
      <div class="user-avatar" id="user-avatar">A</div>
      <div>
        <div class="user-name" id="user-name">Administrator</div>
        <div style="font-size:10px;color:var(--text-dim);">Admin</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- MOBILE TAB BAR -->
  <div style="display:flex;gap:0;background:var(--bg-surface);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 12px;" class="mobile-tabs">
    <button class="nav-tab active" id="mob-tab-overview" onclick="switchTab('overview')" style="flex-shrink:0;border-radius:0;padding:12px 14px;">Overview</button>
    <button class="nav-tab" id="mob-tab-books" onclick="switchTab('books')" style="flex-shrink:0;border-radius:0;padding:12px 14px;">Books</button>
    <button class="nav-tab" id="mob-tab-members" onclick="switchTab('members')" style="flex-shrink:0;border-radius:0;padding:12px 14px;">Members</button>
    <button class="nav-tab" id="mob-tab-transactions" onclick="switchTab('transactions')" style="flex-shrink:0;border-radius:0;padding:12px 14px;">Transactions</button>
  </div>

  <div class="app-container">
    <div class="main-content">

      <!-- ═══════ OVERVIEW TAB ═══════ -->
      <div id="panel-overview" class="tab-panel active">
        <div class="mb-24">
          <div style="font-size:22px;font-weight:800;margin-bottom:4px;">Library Overview</div>
          <div style="color:var(--text-dim);font-size:14px;">Live statistics from your MySQL database</div>
        </div>
        <div id="stat-cards" class="stat-cards">
          <div class="loading"><div class="spinner"></div> Loading stats...</div>
        </div>
        <div class="section-header">
          <div>
            <div class="section-title">⚠️ Overdue Books</div>
            <div class="section-sub">Books past their due date</div>
          </div>
        </div>
        <div id="overdue-table" class="glass-card">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- ═══════ BOOKS TAB ═══════ -->
      <div id="panel-books" class="tab-panel">
        <div class="section-header mb-16">
          <div>
            <div class="section-title">📚 Book Catalog</div>
            <div class="section-sub" id="book-count">Loading...</div>
          </div>
          <div class="d-flex gap-8">
            <div class="search-bar">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input class="input-field" type="text" id="book-search" placeholder="Search books..." oninput="renderBooks()" style="width:220px;" />
            </div>
            <button class="btn btn-primary" onclick="openBookModal(null)">+ Add Book</button>
          </div>
        </div>
        <div id="books-table" class="glass-card table-wrap">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- ═══════ MEMBERS TAB ═══════ -->
      <div id="panel-members" class="tab-panel">
        <div class="section-header mb-16">
          <div>
            <div class="section-title">👥 Member Directory</div>
            <div class="section-sub" id="member-count">Loading...</div>
          </div>
          <div class="d-flex gap-8">
            <div class="search-bar">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input class="input-field" type="text" id="member-search" placeholder="Search members..." oninput="renderMembers()" style="width:220px;" />
            </div>
            <button class="btn btn-primary" onclick="openMemberModal(null)">+ Add Member</button>
          </div>
        </div>
        <div id="members-table" class="glass-card table-wrap">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- ═══════ TRANSACTIONS TAB ═══════ -->
      <div id="panel-transactions" class="tab-panel">
        <div class="section-header mb-16">
          <div>
            <div class="section-title">📝 Transaction Audit Log</div>
            <div class="section-sub" id="tx-count">Loading...</div>
          </div>
        </div>
        <div id="transactions-table" class="glass-card table-wrap">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

  <!-- BOOK MODAL -->
  <div id="book-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">
        <span id="book-modal-icon">📚</span>
        <span id="book-modal-title">Add New Book</span>
      </div>
      <form id="book-form">
        <div class="grid-2">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" id="book-title" class="input-field" required placeholder="Book title" />
          </div>
          <div class="form-group">
            <label>Author *</label>
            <input type="text" id="book-author" class="input-field" required placeholder="Author name" />
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>ISBN</label>
            <input type="text" id="book-isbn" class="input-field" placeholder="978-..." />
          </div>
          <div class="form-group">
            <label>Genre</label>
            <input type="text" id="book-genre" class="input-field" placeholder="e.g. Fiction" />
          </div>
        </div>
        <div class="form-group">
          <label>Total Copies *</label>
          <input type="number" id="book-copies" class="input-field" required min="1" placeholder="e.g. 5" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('book-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="book-save-btn">Save Book</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MEMBER MODAL -->
  <div id="member-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">
        <span id="member-modal-icon">👤</span>
        <span id="member-modal-title">Add New Member</span>
      </div>
      <form id="member-form">
        <div class="grid-2">
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" id="mem-first" class="input-field" required placeholder="First name" />
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" id="mem-last" class="input-field" required placeholder="Last name" />
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="mem-email" class="input-field" required placeholder="email@example.com" />
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="mem-phone" class="input-field" placeholder="10-digit number" />
          </div>
          <div class="form-group">
            <label>Membership Type</label>
            <select id="mem-type" class="input-field">
              <option value="STUDENT">STUDENT</option>
              <option value="FACULTY">FACULTY</option>
              <option value="REGULAR">REGULAR</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Password <span id="pass-hint" style="color:var(--text-dim);font-weight:400;">(leave blank to keep current)</span></label>
          <input type="password" id="mem-pass" class="input-field" placeholder="Min 6 characters" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('member-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="member-save-btn">Save Member</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
