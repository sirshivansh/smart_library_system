<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Haven — Smart Library System Login</title>
  <meta name="description" content="Login to Book Haven Smart Library System — MVC Architecture, MySQL, Java 11" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-container">
    <div class="login-wrapper">
      <div class="login-box">

        <!-- Logo -->
        <div class="login-logo">
          <div style="text-align:center;">
            <div class="brand-icon" style="width:60px;height:60px;border-radius:18px;margin:0 auto 12px;">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:34px;height:34px;color:white;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
            </div>
            <div style="font-size:26px;font-weight:800;color:var(--text-primary);">Book Haven</div>
            <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;">Smart Library System</div>
          </div>
        </div>

        <!-- Card -->
        <div class="glass-card glow-border" style="padding:28px;">
          <div class="login-title">Welcome Back</div>
          <div style="font-size:14px;color:var(--text-muted);margin-bottom:24px;">Sign in to access your library portal</div>

          <!-- Error box -->
          <div id="error-box" class="error-box">Invalid credentials. Please try again.</div>

          <form id="login-form">
            <div class="form-group">
              <label for="email-input">Email or Username</label>
              <input type="text" id="email-input" class="input-field" placeholder="admin or your@email.com" required autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="password-input">Password</label>
              <input type="password" id="password-input" class="input-field" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;">
              <span id="btn-text">Sign In</span>
              <span id="btn-spinner" class="spinner" style="display:none;"></span>
            </button>
          </form>

          <!-- Quick fill buttons -->
          <div style="margin-top:4px;">
            <p style="font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:10px;margin-top:18px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Quick Demo Access</p>
            <div class="quick-fill" style="margin-top:0; padding-top:0; border:none;">
              <button class="quick-btn" onclick="fillCredentials('admin')">
                <div class="quick-btn-role role-admin">👑 Admin</div>
                <div class="quick-btn-cred">admin / 123</div>
              </button>
              <button class="quick-btn" onclick="fillCredentials('member')">
                <div class="quick-btn-role role-member">🎓 Member</div>
                <div class="quick-btn-cred">Student account</div>
              </button>
            </div>
            
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border); text-align:center;">
              <button id="setup-db-btn" class="btn btn-ghost btn-sm" onclick="setupDatabase()" style="font-size:11px; padding:6px 12px;">
                ⚙️ Initialize / Reset Database
              </button>
            </div>
          </div>
        </div>

        <p class="login-footer">Book Haven Smart Library • MVC Architecture • MySQL • Java 11</p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    const existingUser = session.get();
    if (existingUser) {
      window.location.href = existingUser.role === 'ADMIN' ? 'admin.html' : 'member.html';
    }

    function fillCredentials(type) {
      if (type === 'admin') {
        document.getElementById('email-input').value = 'admin';
        document.getElementById('password-input').value = '123';
      } else {
        document.getElementById('email-input').value = 'shivnsh01@gmail.com';
        document.getElementById('password-input').value = 'password123';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      const errorBox = document.getElementById('error-box');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');
      const btn = document.getElementById('login-btn');

      errorBox.classList.remove('visible');
      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      spinner.style.display = 'inline-block';

      try {
        const data = await api.login(email, password);
        if (!data || !data.user) {
          errorBox.textContent = 'Invalid credentials. Please check your email/username and password.';
          errorBox.classList.add('visible');
        } else {
          session.set(data.user);
          window.location.href = data.user.role === 'ADMIN' ? 'admin.html' : 'member.html';
        }
      } catch (err) {
        errorBox.textContent = err.message || 'Login failed. Make sure the Java server is running (mvn exec:java).';
        errorBox.classList.add('visible');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        spinner.style.display = 'none';
      }
    });

    async function setupDatabase() {
      const btn = document.getElementById('setup-db-btn');
      btn.disabled = true;
      btn.textContent = 'Running Setup...';
      try {
        await api.setupDb();
        alert('Database checked/initialized successfully! Please check the Java terminal for logs.');
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '⚙️ Initialize / Reset Database';
      }
    }
  </script>
</body>
</html>
